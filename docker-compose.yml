version: '3.8'

services:
  postgres_oltp:
    image: postgres:15
    container_name: mds_oltp
    environment:
      POSTGRES_USER: ${OLTP_USER}
      POSTGRES_PASSWORD: ${OLTP_PASSWORD}
      POSTGRES_DB: ${OLTP_DB}
    ports:
      - "5434:5432"
    volumes:
      - pgdata_oltp:/var/lib/postgresql/data
    restart: unless-stopped

  postgres_olap:
    image: postgres:15
    container_name: mds_olap
    environment:
      POSTGRES_USER: ${OLAP_USER}
      POSTGRES_PASSWORD: ${OLAP_PASSWORD}
      POSTGRES_DB: ${OLAP_DB}
    ports:
      - "5435:5432"
    volumes:
      - pgdata_olap:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: mds_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres_oltp
      - postgres_olap
    restart: unless-stopped

volumes:
  pgdata_oltp:
  pgdata_olap:
